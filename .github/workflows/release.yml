name: 🚀 Auto Release Toolkit

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version Bump Type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      codename:
        description: 'Release Codename (Optional, e.g. Birthday)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch previous tags for version calculation

      - name: 🔢 Calculate Next Version
        id: version
        shell: pwsh
        run: |
          Write-Host "Finding the latest tag..."
          $latestTag = git describe --tags --abbrev=0 2>$null
          if (-not $latestTag) { $latestTag = "v2.6" } # Fallback to v2.6
          
          $versionStr = $latestTag.TrimStart('v', 'V')
          $parts = $versionStr.Split('.')
          [int]$major = if ($parts.Length -gt 0) { $parts[0] } else { 0 }
          [int]$minor = if ($parts.Length -gt 1) { $parts[1] } else { 0 }
          [int]$patch = if ($parts.Length -gt 2) { $parts[2] } else { 0 }
          
          $bump = "${{ github.event.inputs.bump }}"
          if ($bump -eq "major") {
            $major++
            $minor = 0
            $patch = 0
          } elseif ($bump -eq "minor") {
            $minor++
            $patch = 0
          } else {
            $patch++
          }
          
          if ($patch -eq 0) {
            $nextTag = "v$major.$minor"
          } else {
            $nextTag = "v$major.$minor.$patch"
          }
          
          Write-Output "next_tag=$nextTag" >> $env:GITHUB_OUTPUT
          Write-Host "New version to be released: $nextTag (based on $latestTag)"

      - name: 🛠️ Prepare Release Script & Changelog
        id: prep
        shell: pwsh
        run: |
          $nextTag = "${{ steps.version.outputs.next_tag }}"
          $codename = "${{ github.event.inputs.codename }}"
          $sourceFile = "Test Build/ncexs-Toolkit-Test.ps1"
          $stableFile = "ncexs-Toolkit.ps1"
          $releaseAsset = "ncexs-Toolkit-$nextTag.ps1"
          
          if ($codename) {
            $displayVersion = "$nextTag $codename"
            $releaseName = "Release $nextTag: $codename"
          } else {
            $displayVersion = $nextTag
            $releaseName = "Release $nextTag"
          }
          Write-Output "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          
          # Copy Test Build to be the actual release file
          Copy-Item -Path $sourceFile -Destination $stableFile
          
          # Replace "Test Build" string inside the script with the actual release version
          $content = Get-Content $stableFile
          $content = $content -replace '\$global:ToolkitVersion = "Test Build"', "`$global:ToolkitVersion = `"$displayVersion`""
          $content | Set-Content $stableFile
          
          # Create a copy for the release page with the version in the filename
          Copy-Item -Path $stableFile -Destination $releaseAsset
          Write-Host "Release file successfully prepared: $releaseAsset"
          Write-Output "release_asset=$releaseAsset" >> $env:GITHUB_OUTPUT

          # --- Generate Custom Changelog ---
          $latestTag = git describe --tags --abbrev=0 2>$null
          if (-not $latestTag) { $latestTag = "v2.6" }
          
          # Ambil semua commit yang memodifikasi Test Build sejak tag sebelumnya
          $commits = git log ${latestTag}..HEAD --pretty=format:"%s" -- "Test Build/ncexs-Toolkit-Test.ps1"
          
          $features = @()
          $fixes = @()
          $others = @()
          
          if ($commits) {
              foreach ($msg in $commits) {
                  if ($msg -match "^(?i)(feat|feature|add|new):?\s*(.*)") {
                      $features += "- $($matches[2])"
                  } elseif ($msg -match "^(?i)(fix|bug|patch):?\s*(.*)") {
                      $fixes += "- $($matches[2])"
                  } else {
                      $others += "- $msg"
                  }
              }
          } else {
              $others += "- Updated Toolkit to $nextTag"
          }
          
          $changelog = @()
          if ($features.Count -gt 0) {
              $changelog += "✨ Features & Enhancements"
              $changelog += $features
              $changelog += ""
          }
          if ($fixes.Count -gt 0) {
              $changelog += "🐛 Bug Fixes & Refactors"
              $changelog += $fixes
              $changelog += ""
          }
          if ($others.Count -gt 0) {
              $changelog += "🔧 Other Changes"
              $changelog += $others
              $changelog += ""
          }
          
          $changelog -join "`n" | Out-File "RELEASE_NOTES.md" -Encoding utf8
          Write-Host "Changelog successfully generated."

      - name: 🚀 Push to Stable Branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B stable
          git add ncexs-Toolkit.ps1 -f
          git diff-index --quiet HEAD || git commit -m "chore(release): publish ${{ steps.version.outputs.next_tag }}"
          git push origin stable --force

      - name: 📦 Create Automatic GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: ${{ steps.prep.outputs.release_name }}
          files: ${{ steps.prep.outputs.release_asset }}
          body_path: RELEASE_NOTES.md
