name: 🧱 Build & Test ncexs Toolkit

on:
  push:
    branches:
      - main
    paths:
      - "**/*.ps1"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Scan PowerShell with PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction SilentlyContinue
          $results = Invoke-ScriptAnalyzer -Path ./ncexs-Toolkit.ps1 -Recurse -Severity Error,Warning
          if ($results) {
              $results | Format-Table
              Write-Error "PSScriptAnalyzer mendeteksi kesalahan atau peringatan keamanan!"
              exit 1
          } else {
              Write-Host "Analisis statis aman! Tidak ditemukan masalah kritis."
          }


      - name: 🧪 Run Pester Tests
        shell: pwsh
        run: |
          Write-Host "=== Running Pester Tests ==="
          $testPath = "Tests/Ncexs-Toolkit.Tests.ps1"
          if (Test-Path $testPath) {
            $results = Invoke-Pester -Path $testPath -PassThru
            if ($results.FailedCount -gt 0) {
              Write-Error "❌ Some tests failed: $($results.FailedCount) test(s) failed."
              exit 1
            } else {
              Write-Host "✅ All tests passed successfully!"
            }
          } else {
            Write-Host "⚠️ Test file not found at $testPath — skipping tests."
          }

      - name: 🛡️ VirusTotal Scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        if: ${{ env.VT_API_KEY != '' }}
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./ncexs-Toolkit.ps1


